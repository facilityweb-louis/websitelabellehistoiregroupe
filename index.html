    :root {

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--cream);

      font-weight: 300;
      color: var(--dark);

    }
    html { scroll-behavior: smooth; }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'DM Serif Display', Georgia, 'Times New Roman', serif;
      font-weight: 400 !important;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .font-subtitle {

      font-style: italic;
      font-weight: 400;
    }
    .logo-chip {
      font-family: 'DM Serif Display', Georgia, serif;
      font-style: italic;
      letter-spacing: 0.01em;
    }

    /* ── Animations ── */
    @keyframes marquee     { from { transform: translateX(0); }       to { transform: translateX(-50%); } }
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGlow   { 0%,100% { opacity: .3; transform: scale(1); }  50% { opacity: .5; transform: scale(1.07); } }

    .animate-marquee     { animation: marquee 55s linear infinite; }
    .animate-slideUpFade { animation: slideUpFade .85s ease forwards; }
    .animate-pulseGlow   { animation: pulseGlow 8s ease-in-out infinite; }

    .marquee-mask {
      -webkit-mask-image: linear-gradient(to right, transparent 0, #000 7%, #000 93%, transparent 100%);
              mask-image: linear-gradient(to right, transparent 0, #000 7%, #000 93%, transparent 100%);
    }

    /* ── Scroll reveal ── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .7s ease, transform .7s ease;
    }
    .reveal.in { opacity: 1; transform: translateY(0); }

    /* ── Venue mosaic card ── */
    .venue-card { position: relative; overflow: hidden; cursor: pointer; }
    .venue-card-img {
      transition: transform .65s cubic-bezier(.25,.46,.45,.94),
                  opacity   .45s ease;
    }
    .venue-card:hover .venue-card-img { transform: scale(1.07); opacity: .9 !important; }

    .venue-card-overlay {
      position: absolute; inset: 0;
      background: rgba(26,16,8,.75);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 1.5rem;
      opacity: 0;
      transition: opacity .4s ease;
    }
    .venue-card:hover .venue-card-overlay { opacity: 1; }

    .venue-card-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 1.25rem 1.25rem .9rem;
      background: linear-gradient(to top, rgba(26,16,8,.65) 0%, transparent 100%);
      transition: opacity .35s ease;
    }
    .venue-card:hover .venue-card-label { opacity: 0; }

    /* ── Tag pill ── */
    .tag-pill {
      display: inline-block;
      border: 1px solid rgba(255,255,255,.18);
      padding: 2px 8px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: rgba(255,255,255,.55);
    }

    /* ── Stat band first cell dark ── */
    .stat-dark  { background: var(--dark); }
    .stat-light { background: var(--cream); }

    /* ── Journey step ── */
    .journey-step {
      display: flex; align-items: flex-start; gap: 1.25rem;
      padding: 1.1rem 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .journey-step:last-child { border-bottom: none; }

    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0); cursor: pointer; }
  </style>

            stats: [{ value: "Soon", label: "restaurant opening" }, { value: "1", label: "upcoming venue" }, { value: "62", label: "Opal Coast · Pas-de-Calais" }],
            sectionTitle: "Hardelot, the venue in preparation.",

    /* ============================================================
       COMPONENT
       ============================================================ */
    function LBHHomepage() {
      const [location, setLocation] = useState("all");
      const [lang, setLang] = useState(() => {
        if (typeof window === "undefined") return "fr";
        const saved = localStorage.getItem("lbh-lang");
        if (saved === "fr" || saved === "en") return saved;
        return navigator.language && navigator.language.toLowerCase().startsWith("en") ? "en" : "fr";
      });

      useEffect(() => {
        localStorage.setItem("lbh-lang", lang);
        document.documentElement.lang = lang;
      }, [lang]);

      /* Scroll reveal observer */
      useEffect(() => {
        const obs = new IntersectionObserver(
          (entries) => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("in"); }),
          { threshold: 0.12, rootMargin: "0px 0px -40px 0px" }
        );
        document.querySelectorAll(".reveal").forEach(el => obs.observe(el));
        return () => obs.disconnect();
      });

      const t = T[lang];
      const venuesData = allVenues(lang);
      const venues = useMemo(
        () => (location === "all" ? venuesData : venuesData.filter((v) => v.loc === location)),
        [location, lang]
      );
      const content = t.locContent[location];

      const LangToggle = () => (
        <div style={{ display:"flex", alignItems:"center", border:"1px solid rgba(26,16,8,.15)", borderRadius:"999px", padding:"2px", gap:0 }}>
          <button onClick={() => setLang("fr")}
            style={{ borderRadius:"999px", padding:"5px 12px", fontSize:"11px", fontWeight:500, cursor:"pointer", border:"none", transition:"all .2s",
              background: lang==="fr" ? "var(--dark)" : "transparent",
              color:       lang==="fr" ? "var(--cream)" : "rgba(26,16,8,.4)" }}>FR</button>
          <button onClick={() => setLang("en")}
            style={{ borderRadius:"999px", padding:"5px 12px", fontSize:"11px", fontWeight:500, cursor:"pointer", border:"none", transition:"all .2s",
              background: lang==="en" ? "var(--dark)" : "transparent",
              color:       lang==="en" ? "var(--cream)" : "rgba(26,16,8,.4)" }}>EN</button>
        </div>
      );

      const FilterBar = ({ dark = false }) => (
        <div style={{ display:"flex", flexWrap:"wrap" }}>
          {[
            { key:"all",      label: t.filterAll },
            { key:"touquet",  label: t.filterTouquet },
            { key:"hardelot", label: t.filterHardelot },
            { key:"meribel",  label: t.filterMeribel },
          ].map((f, i) => (
            <button key={f.key} onClick={() => setLocation(f.key)}
              style={{
                padding: "14px 24px",
                fontSize: "10px",
                textTransform: "uppercase",
                letterSpacing: ".25em",
                fontWeight: 500,
                cursor: "pointer",
                border: "none",
                borderLeft: i > 0 ? `1px solid ${dark ? "rgba(255,255,255,.08)" : "rgba(26,16,8,.08)"}` : "none",
                transition: "all .2s",
                background: location === f.key
                  ? (dark ? "rgba(248,244,237,.12)" : "var(--dark)")
                  : "transparent",
                color: location === f.key
                  ? (dark ? "var(--cream)" : "var(--cream)")
                  : (dark ? "rgba(255,255,255,.38)" : "rgba(26,16,8,.4)"),
              }}>
              {f.label}
            </button>
          ))}
        </div>
      );

      return (
        <div style={{ background:"var(--cream)", minHeight:"100vh", color:"var(--dark)" }}>

          {/* ══════════════════════════════════════
              HEADER
          ══════════════════════════════════════ */}
          <header style={{
            position:"sticky", top:0, zIndex:50,
            background:"rgba(248,244,237,.92)",
            backdropFilter:"blur(14px)",
            borderBottom:"1px solid rgba(26,16,8,.1)",
          }}>
            <div style={{ maxWidth:"none", margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"space-between", gap:"1rem", padding:"0 3rem" }}>
              <a href="#" style={{ display:"flex", alignItems:"center", gap:"12px", textDecoration:"none" }}>
                <img src="assets/logos/lbh-seal.png" style={{ height:"56px", width:"56px", objectFit:"contain" }} alt="" aria-hidden="true" />
                <div>
                  <img src="assets/logos/lbh-wordmark.png" style={{ height:"22px", objectFit:"contain", display:"block" }} alt="La Belle Histoire Groupe" />
                  <div style={{ marginTop:"3px", fontSize:"9px", textTransform:"uppercase", letterSpacing:".3em", color:"rgba(26,16,8,.35)" }}>{t.headerTag}</div>
                </div>
              </a>

              <nav style={{ display:"flex", alignItems:"center", gap:"2.5rem" }}>
                {[
                  { href:"#group",  label:t.navGroup },
                  { href:"#venues", label:t.navVenues },
                  { href:"#events", label:t.navEvents },
                ].map(n => (
                  <a key={n.href} href={n.href} style={{ fontSize:"13px", color:"rgba(26,16,8,.5)", textDecoration:"none", transition:"color .2s", fontWeight:400 }}
                     onMouseEnter={e=>e.target.style.color="var(--dark)"} onMouseLeave={e=>e.target.style.color="rgba(26,16,8,.5)"}>
                    {n.label}
                  </a>
                ))}
              </nav>

              <div style={{ display:"flex", alignItems:"center", gap:"12px", padding:"14px 0" }}>
                <LangToggle />
                <a href="reserver.html" style={{
                  background:"var(--dark)", color:"var(--cream)",
                  padding:"10px 22px", fontSize:"12px", fontWeight:600,
                  letterSpacing:".1em", textTransform:"uppercase",
                  textDecoration:"none", borderRadius:"3px", transition:"background .2s"
                }}
                onMouseEnter={e=>e.currentTarget.style.background="var(--mid)"}
                onMouseLeave={e=>e.currentTarget.style.background="var(--dark)"}>
                  {t.ctaReserve}
                </a>
              </div>
            </div>
          </header>

          {/* ══════════════════════════════════════
              HERO — plein écran, sombre, immersif
          ══════════════════════════════════════ */}
          <section style={{ position:"relative", minHeight:"100vh", overflow:"hidden", background:"var(--dark)" }}>
            {/* Vidéo */}
            <video autoPlay muted loop playsInline
              poster="https://images.pexels.com/videos/36805136/pictures/preview-0.jpg"
              style={{ position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"cover", opacity:.28 }}>
              <source src="https://videos.pexels.com/video-files/36805136/15596007_1920_1080_50fps.mp4" type="video/mp4" />
            </video>
            {/* Dégradé sombre */}
            <div style={{ position:"absolute", inset:0, background:"linear-gradient(to bottom, rgba(26,16,8,.15) 0%, rgba(26,16,8,.55) 60%, rgba(26,16,8,.9) 100%)" }} />
            {/* Sceau watermark */}
            <img src="assets/logos/lbh-seal.png" aria-hidden="true"
              style={{ position:"absolute", right:"-8%", top:"50%", transform:"translateY(-50%)", height:"90vh", width:"auto", objectFit:"contain", opacity:.04, pointerEvents:"none", filter:"invert(1)", userSelect:"none" }} />

            {/* Contenu héro */}
            <div key={`${location}-${lang}`}
              style={{ position:"relative", display:"flex", flexDirection:"column", minHeight:"100vh", justifyContent:"space-between" }}
              className="animate-slideUpFade">

              {/* Badge destination */}
              <div style={{ padding:"2.5rem 3rem 0" }}>
                <span style={{
                  display:"inline-block", border:"1px solid rgba(255,255,255,.18)",
                  padding:"7px 18px", fontSize:"9px", textTransform:"uppercase",
                  letterSpacing:".35em", color:"rgba(255,255,255,.5)"
                }}>{content.badge}</span>
              </div>

              {/* Titre géant + intro */}
              <div style={{ padding:"0 3rem 2.5rem", display:"grid", gridTemplateColumns:"1fr auto", gap:"2rem", alignItems:"flex-end" }}>
                <div>
                  <h1 style={{
                    fontSize:"clamp(3rem,8vw,8rem)", lineHeight:".95",
                    color:"var(--cream)", margin:0
                  }}>
                    {content.title}
                    <span className="font-subtitle" style={{ display:"block", color:"rgba(248,244,237,.52)", marginTop:".1em" }}>
                      {content.subtitle}
                    </span>
                  </h1>
                  <p style={{ marginTop:"1.5rem", maxWidth:"540px", fontSize:"15px", lineHeight:1.75, color:"rgba(255,255,255,.52)", fontWeight:300 }}>
                    {content.intro}
                  </p>
                  <div style={{ marginTop:"2rem", display:"flex", gap:"12px", flexWrap:"wrap" }}>
                    <a href="#venues" style={{
                      display:"inline-flex", alignItems:"center", gap:"8px",
                      background:"var(--cream)", color:"var(--dark)",
                      padding:"13px 28px", fontSize:"12px", fontWeight:600,
                      letterSpacing:".1em", textTransform:"uppercase", textDecoration:"none",
                      borderRadius:"3px", transition:"background .2s"
                    }}
                    onMouseEnter={e=>e.currentTarget.style.background="#fff"}
                    onMouseLeave={e=>e.currentTarget.style.background="var(--cream)"}>
                      {t.discover} →
                    </a>
                    <a href="#events" style={{
                      display:"inline-flex", alignItems:"center", gap:"8px",
                      border:"1px solid rgba(255,255,255,.25)", color:"rgba(255,255,255,.75)",
                      padding:"13px 28px", fontSize:"12px", fontWeight:400,
                      letterSpacing:".08em", textDecoration:"none",
                      borderRadius:"3px", transition:"all .2s"
                    }}
                    onMouseEnter={e=>{ e.currentTarget.style.borderColor="rgba(255,255,255,.6)"; e.currentTarget.style.color="#fff"; }}
                    onMouseLeave={e=>{ e.currentTarget.style.borderColor="rgba(255,255,255,.25)"; e.currentTarget.style.color="rgba(255,255,255,.75)"; }}>
                      {t.eventsCta}
                    </a>
                  </div>
                </div>

                {/* Stats verticales */}
                <div style={{ border:"1px solid rgba(255,255,255,.1)", minWidth:"220px" }}>
                  {content.stats.map((item, i) => (
                    <div key={item.label} style={{
                      padding:"1.2rem 1.5rem",
                      borderBottom: i < content.stats.length - 1 ? "1px solid rgba(255,255,255,.08)" : "none"
                    }}>
                      <div style={{ fontSize:"2.2rem", color:"var(--cream)", lineHeight:1, fontFamily:"'DM Serif Display',Georgia,serif" }}>{item.value}</div>
                      <div style={{ marginTop:"5px", fontSize:"9px", textTransform:"uppercase", letterSpacing:".22em", color:"rgba(255,255,255,.35)" }}>{item.label}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Barre filtres destinations — bas du héro */}
              <div style={{ borderTop:"1px solid rgba(255,255,255,.08)", background:"rgba(26,16,8,.35)", backdropFilter:"blur(8px)" }}>
                <FilterBar dark={true} />
              </div>
            </div>
          </section>

          {/* ══════════════════════════════════════
              MARQUEE — logos sur fond sombre
          ══════════════════════════════════════ */}
          <section style={{ background:"var(--dark)", borderBottom:"1px solid rgba(255,255,255,.06)" }}>
            <div style={{ padding:"2rem 0", overflow:"hidden" }} className="marquee-mask">
              <div className="animate-marquee" style={{ display:"flex", alignItems:"center", gap:"4rem", whiteSpace:"nowrap", width:"max-content" }}>
                {[...venuesData, ...venuesData].map((v, i) => (
                  <div key={`mq-${i}`} style={{ display:"flex", alignItems:"center", gap:"4rem" }}>
                    {v.image ? (
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"66px", width:"180px" }}>
                        <img src={v.image} alt={v.name} style={{ maxHeight:"100%", maxWidth:"100%", objectFit:"contain", filter:"invert(1)", opacity:.45, transition:"opacity .3s" }}
                             onMouseEnter={e=>e.target.style.opacity=".85"} onMouseLeave={e=>e.target.style.opacity=".45"} />
                      </div>
                    ) : (
                      <span className="logo-chip" style={{ fontSize:"1.5rem", color:"rgba(255,255,255,.4)", borderBottom:`1px solid ${v.color}70`, paddingBottom:"2px" }}>
                        {v.name}
                      </span>
                    )}
                    <span style={{ color:"rgba(255,255,255,.15)", fontSize:"10px" }} aria-hidden="true">✦</span>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* ══════════════════════════════════════
              STATS BAND — éditorial
          ══════════════════════════════════════ */}
          <section id="group" style={{ borderBottom:"1px solid rgba(26,16,8,.1)" }}>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", divideColor:"rgba(26,16,8,.1)" }}>
              {content.stats.map((item, i) => (
                <div key={item.label} className="reveal"
                  style={{
                    padding:"4.5rem 3rem",
                    background: i === 0 ? "var(--dark)" : "var(--cream)",
                    borderRight: i < 2 ? `1px solid ${i===0?"rgba(255,255,255,.08)":"rgba(26,16,8,.1)"}` : "none",
                    animationDelay:`${i*.1}s`
                  }}>
                  <div style={{
                    fontSize:"clamp(3.5rem,6vw,6rem)", lineHeight:1,
                    color: i === 0 ? "var(--cream)" : "var(--dark)",
                    fontFamily:"'DM Serif Display',Georgia,serif", fontWeight:400
                  }}>{item.value}</div>
                  <div style={{
                    marginTop:"1rem", fontSize:"10px", textTransform:"uppercase", letterSpacing:".25em",
                    color: i === 0 ? "rgba(255,255,255,.38)" : "rgba(26,16,8,.38)"
                  }}>{item.label}</div>
                </div>
              ))}
            </div>
          </section>

          {/* ══════════════════════════════════════
              VENUES — mosaïque plein écran
          ══════════════════════════════════════ */}
          <section id="venues" style={{ background:"var(--cream)" }}>
            {/* En-tête section */}
            <div style={{ borderBottom:"1px solid rgba(26,16,8,.1)", padding:"4rem 3rem" }}>
              <div style={{ display:"flex", flexWrap:"wrap", alignItems:"flex-end", justifyContent:"space-between", gap:"2rem" }}>
                <div className="reveal">
                  <span style={{ fontSize:"10px", textTransform:"uppercase", letterSpacing:".35em", color:"rgba(26,16,8,.38)" }}>
                    {t.venuesEyebrow[location]}
                  </span>
                  <h2 style={{ marginTop:"10px", fontSize:"clamp(2.2rem,5vw,5rem)", color:"var(--dark)", maxWidth:"700px" }}>
                    {content.sectionTitle}
                  </h2>
                  <p style={{ marginTop:"1rem", maxWidth:"460px", fontSize:"14px", lineHeight:1.75, color:"rgba(26,16,8,.52)" }}>
                    {content.sectionDesc}
                  </p>
                </div>

                {/* Filtres */}
                <div style={{ display:"flex", flexWrap:"wrap", gap:"8px" }}>
                  {[
                    { key:"all",      label:`${t.shortAll} (${venuesData.length})` },
                    { key:"touquet",  label:`${t.filterTouquet} (${venuesData.filter(v=>v.loc==="touquet").length})` },
                    { key:"hardelot", label:`${t.filterHardelot} (${venuesData.filter(v=>v.loc==="hardelot").length})` },
                    { key:"meribel",  label:`${t.filterMeribel} (${venuesData.filter(v=>v.loc==="meribel").length})` },
                  ].map(f => (
                    <button key={f.key} onClick={() => setLocation(f.key)}
                      style={{
                        border: location===f.key ? "1px solid var(--dark)" : "1px solid rgba(26,16,8,.18)",
                        background: location===f.key ? "var(--dark)" : "transparent",
                        color: location===f.key ? "var(--cream)" : "rgba(26,16,8,.5)",
                        padding:"8px 16px", fontSize:"10px", textTransform:"uppercase",
                        letterSpacing:".2em", cursor:"pointer", fontWeight:500, transition:"all .2s", borderRadius:"3px"
                      }}>
                      {f.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* Mosaïque — grille plein écran */}
            <div key={`grid-${location}-${lang}`} style={{
              display:"grid",
              gridTemplateColumns: venues.length === 1 ? "1fr" : venues.length <= 4 ? "repeat(2,1fr)" : "repeat(4,1fr)",
            }}>
              {venues.map((venue, i) => {
                const isDouble = venues.length > 4 && (i === 0 || (venues.length % 4 !== 0 && i === venues.length - 1));
                return (
                  <div key={venue.name} className="venue-card"
                    style={{
                      background: venue.color,
                      aspectRatio: isDouble ? "2/1" : "1/1",
                      gridColumn: isDouble ? "span 2" : "span 1",
                      borderRight: (i+1) % 4 !== 0 ? "1px solid rgba(255,255,255,.06)" : "none",
                      borderBottom: "1px solid rgba(255,255,255,.06)",
                    }}>
                    {/* Image logo */}
                    {venue.image ? (
                      <img src={venue.image} alt={venue.name} loading="lazy"
                        className="venue-card-img"
                        style={{ position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"contain", padding:"8%", mixBlendMode:"luminosity", opacity:.55 }} />
                    ) : (
                      <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                        <span className="logo-chip" style={{ fontSize:"3rem", color:"rgba(255,255,255,.18)" }}>{venue.name}</span>
                      </div>
                    )}

                    {/* Overlay hover */}
                    <div className="venue-card-overlay">
                      <span style={{ fontSize:"9px", textTransform:"uppercase", letterSpacing:".25em", color:"rgba(255,255,255,.45)", marginBottom:"8px", display:"block" }}>
                        {venue[lang].type}
                      </span>
                      <p style={{ fontSize:"13px", color:"rgba(255,255,255,.78)", lineHeight:1.65, margin:"0 0 14px" }}>

                      <div style={{ display:"flex", flexWrap:"wrap", gap:"6px", marginBottom:"16px" }}>

                        onMouseEnter={() => prefetchReserver(`reserver.html?etab=${encodeURIComponent(venue.name)}`)}
                        style={{
                          display:"inline-flex", alignItems:"center", gap:"6px",
                          background:"var(--cream)", color:"var(--dark)",
                          padding:"9px 18px", fontSize:"11px", fontWeight:600,
                          letterSpacing:".1em", textTransform:"uppercase", textDecoration:"none",
                          borderRadius:"3px", alignSelf:"flex-start", transition:"background .2s"
                        }}>
                        {t.ctaReserve} →

                    {/* Label toujours visible */}
                    <div className="venue-card-label">
                      <div style={{ fontSize:"clamp(1.2rem,2.5vw,1.8rem)", color:"#fff", fontFamily:"'DM Serif Display',Georgia,serif" }}>
                        {venue.name}
                      </div>
                      <div style={{ marginTop:"3px", fontSize:"10px", textTransform:"uppercase", letterSpacing:".18em", color:"rgba(255,255,255,.5)" }}>
                        {venue.year} · {t.chip[venue.loc]}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </section>

          {/* ══════════════════════════════════════
              ÉVÉNEMENTS — section sombre
          ══════════════════════════════════════ */}

            <div key={`ev-${location}-${lang}`} style={{
              display:"grid", gridTemplateColumns:"1fr 1fr",
              borderTop:"1px solid rgba(255,255,255,.06)"
            }}>
              {/* Gauche : pitch */}
              <div className="reveal" style={{ padding:"5rem 4rem", borderRight:"1px solid rgba(255,255,255,.07)" }}>
                <span style={{ fontSize:"9px", textTransform:"uppercase", letterSpacing:".38em", color:"rgba(255,255,255,.35)" }}>

                </span>
                <h2 style={{ marginTop:"1rem", fontSize:"clamp(2rem,3.5vw,3.5rem)", color:"var(--cream)", lineHeight:1.1 }}>
                  {t.eventsTitle[location]}

                <p style={{ marginTop:"1.5rem", maxWidth:"480px", fontSize:"14px", lineHeight:1.8, color:"rgba(255,255,255,.5)", fontWeight:300 }}>
                  {t.eventsDesc[location]}
                </p>
                <div style={{ marginTop:"2rem", display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px" }}>
                  {t.eventsItems[location].map(item => (
                    <div key={item} style={{
                      border:"1px solid rgba(255,255,255,.08)", padding:"14px 16px",
                      fontSize:"13px", color:"rgba(255,255,255,.6)", lineHeight:1.5, transition:"border-color .2s"
                    }}
                    onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(255,255,255,.25)"}
                    onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,.08)"}>
                      <span style={{ color:"rgba(255,255,255,.2)", marginRight:"8px" }}>—</span>{item}
                    </div>
                  ))}
                </div>
                <a href="evenements.html" style={{
                  display:"inline-flex", alignItems:"center", gap:"10px",
                  marginTop:"2.5rem", background:"var(--cream)", color:"var(--dark)",
                  padding:"14px 32px", fontSize:"12px", fontWeight:600,
                  letterSpacing:".12em", textTransform:"uppercase", textDecoration:"none",
                  borderRadius:"3px", transition:"background .2s"
                }}
                onMouseEnter={e=>e.currentTarget.style.background="#fff"}
                onMouseLeave={e=>e.currentTarget.style.background="var(--cream)"}>
                  {t.eventsRequest} →
                </a>
              </div>

              {/* Droite : parcours */}
              <div style={{ padding:"5rem 4rem" }}>
                <span style={{ fontSize:"9px", textTransform:"uppercase", letterSpacing:".38em", color:"rgba(255,255,255,.35)" }}>

                </span>
                <div style={{ marginTop:"12px", fontSize:"1.6rem", color:"var(--cream)", fontFamily:"'DM Serif Display',Georgia,serif" }}>
                  {t.parcoursTitle}
                </div>
                <div style={{ marginTop:"2rem" }}>
                  {[t.parcoursDest[location], t.parcoursStep2, t.parcoursStep3, t.parcoursStep4].map((step, i) => (

                      <span style={{ fontSize:"10px", color:"rgba(255,255,255,.18)", fontFamily:"monospace", marginTop:"2px", minWidth:"18px" }}>
                        {String(i+1).padStart(2,"0")}
                      </span>
                      <span style={{ fontSize:"13px", color:"rgba(255,255,255,.6)", lineHeight:1.6 }}>{step}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </section>

          {/* ══════════════════════════════════════
              FOOTER — dense & sombre
          ══════════════════════════════════════ */}
          <footer style={{ background:"var(--dark)" }}>
            {/* Bande logo + CTA */}
            <div style={{
              borderTop:"1px solid rgba(255,255,255,.08)",
              borderBottom:"1px solid rgba(255,255,255,.08)",
              padding:"2.5rem 3rem",
              display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:"1.5rem"
            }}>
              <div style={{ display:"flex", alignItems:"center", gap:"16px" }}>
                <img src="assets/logos/lbh-seal.png" style={{ height:"52px", width:"52px", objectFit:"contain", filter:"invert(1)", opacity:.6 }} alt="LBH" />
                <div>
                  <img src="assets/logos/lbh-wordmark.png" style={{ height:"15px", objectFit:"contain", filter:"invert(1)", opacity:.55 }} alt="" aria-hidden="true" />
                  <div style={{ marginTop:"5px", fontSize:"9px", textTransform:"uppercase", letterSpacing:".3em", color:"rgba(255,255,255,.25)" }}>
                    {t.footerTag}
                  </div>
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
                <a href="reserver.html" style={{
                  background:"var(--cream)", color:"var(--dark)",
                  padding:"10px 22px", fontSize:"11px", fontWeight:600,
                  letterSpacing:".1em", textTransform:"uppercase", textDecoration:"none",
                  borderRadius:"3px"
                }}>{t.ctaReserve}</a>
                <a href="evenements.html" style={{
                  border:"1px solid rgba(255,255,255,.18)", color:"rgba(255,255,255,.6)",
                  padding:"10px 22px", fontSize:"11px", fontWeight:400,
                  letterSpacing:".08em", textDecoration:"none",
                  borderRadius:"3px"
                }}>{t.eventsCta}</a>
              </div>
            </div>

            {/* Colonnes établissements */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", padding:"2.5rem 3rem", gap:"0", borderBottom:"1px solid rgba(255,255,255,.06)" }}>
              <div style={{ paddingRight:"2rem" }}>
                <div style={{ fontSize:"9px", textTransform:"uppercase", letterSpacing:".35em", color:"rgba(255,255,255,.25)", marginBottom:"1rem" }}>Le Touquet</div>
                {venuesData.filter(v=>v.loc==="touquet").map(v => (
                  <div key={v.name} style={{ padding:"4px 0", fontSize:"13px", color:"rgba(255,255,255,.38)", cursor:"pointer", transition:"color .2s" }}
                       onMouseEnter={e=>e.target.style.color="rgba(255,255,255,.7)"} onMouseLeave={e=>e.target.style.color="rgba(255,255,255,.38)"}>
                    {v.name}
                  </div>
                ))}
              </div>
              <div style={{ borderLeft:"1px solid rgba(255,255,255,.06)", padding:"0 2rem" }}>
                <div style={{ fontSize:"9px", textTransform:"uppercase", letterSpacing:".35em", color:"rgba(255,255,255,.25)", marginBottom:"1rem" }}>Méribel</div>
                {venuesData.filter(v=>v.loc==="meribel").map(v => (
                  <div key={v.name} style={{ padding:"4px 0", fontSize:"13px", color:"rgba(255,255,255,.38)" }}>{v.name}</div>
                ))}
                <div style={{ marginTop:"1.5rem", fontSize:"9px", textTransform:"uppercase", letterSpacing:".35em", color:"rgba(255,255,255,.25)", marginBottom:"1rem" }}>Hardelot</div>
                {venuesData.filter(v=>v.loc==="hardelot").map(v => (
                  <div key={v.name} style={{ padding:"4px 0", fontSize:"13px", color:"rgba(255,255,255,.38)" }}>{v.name}</div>
                ))}
              </div>
              <div style={{ borderLeft:"1px solid rgba(255,255,255,.06)", padding:"0 0 0 2rem" }}>
                <div style={{ fontSize:"9px", textTransform:"uppercase", letterSpacing:".35em", color:"rgba(255,255,255,.25)", marginBottom:"1rem" }}>Navigation</div>
                {[
                  { href:"#group",       label:t.navGroup },
                  { href:"#venues",      label:t.navVenues },
                  { href:"#events",      label:t.navEvents },
                  { href:"reserver.html",label:t.ctaReserve },
                  { href:"evenements.html", label:t.eventsCta },
                ].map(n => (
                  <a key={n.href} href={n.href} style={{ display:"block", padding:"4px 0", fontSize:"13px", color:"rgba(255,255,255,.38)", textDecoration:"none", transition:"color .2s" }}
                     onMouseEnter={e=>e.target.style.color="rgba(255,255,255,.7)"} onMouseLeave={e=>e.target.style.color="rgba(255,255,255,.38)"}>
                    {n.label}
                  </a>
                ))}
              </div>
            </div>

            {/* Copyright */}
            <div style={{ padding:"1.5rem 3rem" }}>
              <div style={{ fontSize:"11px", color:"rgba(255,255,255,.18)" }}>
                © {new Date().getFullYear()} La Belle Histoire Groupe — Fondé en 1999
              </div>
            </div>
          </footer>

        </div>
      );
    }

    function prefetchReserver(url) {
      if (typeof window === "undefined") return;
      if (!window.__lbhPrefetchedUrls) window.__lbhPrefetchedUrls = new Set();
      if (window.__lbhPrefetchedUrls.has(url)) return;
      const link = document.createElement("link");
      link.rel = "prefetch"; link.as = "document"; link.href = url;
      document.head.appendChild(link);
      window.__lbhPrefetchedUrls.add(url);
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<LBHHomepage />);
  </script>
</body>
</html>
