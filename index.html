    /* ---------- Base ---------- */
    body {

    /* ---------- Animations ---------- */
    @keyframes floatSlow  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes pulseGlow  { 0%,100% { opacity: .35; transform: scale(1); } 50% { opacity: .55; transform: scale(1.08); } }
    @keyframes slideUpFade{ from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes marquee    { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    .animate-floatSlow    { animation: floatSlow 6s ease-in-out infinite; }
    .animate-pulseGlow    { animation: pulseGlow 7s ease-in-out infinite; }
    .animate-slideUpFade  { animation: slideUpFade .9s ease forwards; }
    .animate-marquee      { animation: marquee 45s linear infinite; }

    .marquee-mask {
      -webkit-mask-image: linear-gradient(to right, transparent 0, #000 10%, #000 90%, transparent 100%);
              mask-image: linear-gradient(to right, transparent 0, #000 10%, #000 90%, transparent 100%);

    function LBHHomepage() {
      const [location, setLocation] = useState("all");
      const [lang, setLang] = useState(() => {
        if (typeof window === "undefined") return "fr";
        const saved = localStorage.getItem("lbh-lang");
        if (saved === "fr" || saved === "en") return saved;
        return navigator.language && navigator.language.toLowerCase().startsWith("en") ? "en" : "fr";
      });

      useEffect(() => {
        localStorage.setItem("lbh-lang", lang);
        document.documentElement.lang = lang;
      }, [lang]);

      const t = T[lang];
      const venuesData = allVenues(lang);
      const venues = useMemo(() => (location === "all" ? venuesData : venuesData.filter((v) => v.loc === location)), [location, lang]);
      const content = t.locContent[location];

      const LangToggle = () => (
        <div className="flex items-center rounded-full border border-black/15 bg-white p-0.5 text-xs font-semibold" role="group" aria-label="Language">
          <button onClick={() => setLang("fr")} className={`rounded-full px-3 py-1.5 transition ${lang === "fr" ? "bg-black text-white" : "text-neutral-500 hover:text-black"}`} aria-pressed={lang === "fr"}>FR</button>
          <button onClick={() => setLang("en")} className={`rounded-full px-3 py-1.5 transition ${lang === "en" ? "bg-black text-white" : "text-neutral-500 hover:text-black"}`} aria-pressed={lang === "en"}>EN</button>
        </div>
      );

      return (
        <div className="min-h-screen bg-white text-neutral-900 selection:bg-black selection:text-white">

          <header className="sticky top-0 z-50 border-b border-black/10 bg-white/80 backdrop-blur-xl">
            <div className="mx-auto flex max-w-7xl items-center justify-between gap-4 px-6 py-4 lg:px-10">
              <a href="#" className="flex items-center gap-3">
                <img src="assets/lbh-seal.png" alt="" aria-hidden="true" className="h-11 w-11 object-contain" />
                <div>
                  <img src="assets/lbh-wordmark.png" alt="La Belle Histoire Groupe" className="hidden h-[18px] object-contain md:block" />
                  <div className="text-lg font-semibold tracking-wide text-black md:hidden">La Belle Histoire Groupe</div>
                  <div className="mt-1 text-[10px] uppercase tracking-[0.3em] text-neutral-500">{t.headerTag}</div>
                </div>
              </a>
              <nav className="hidden items-center gap-8 text-sm text-neutral-600 lg:flex">
                <a href="#group" className="transition hover:text-black">{t.navGroup}</a>
                <a href="#venues" className="transition hover:text-black">{t.navVenues}</a>
                <a href="#events" className="transition hover:text-black">{t.navEvents}</a>
              </nav>
              <div className="flex items-center gap-3">
                <LangToggle />
                <a href="reserver.html" className="rounded-full bg-black px-5 py-3 text-base font-semibold text-white shadow-lg transition hover:scale-[1.03] hover:shadow-xl md:px-7">{t.ctaReserve}</a>
              </div>
            </div>
          </header>

          <section className="relative overflow-hidden">
            <video autoPlay muted loop playsInline poster="https://images.pexels.com/videos/36805136/pictures/preview-0.jpg" className="absolute inset-0 h-full w-full object-cover">
              <source src="https://videos.pexels.com/video-files/36805136/15596007_1920_1080_50fps.mp4" type="video/mp4" />
            </video>
            <div className="absolute inset-0 bg-white/70 backdrop-blur-[2px]" />
            <div className="absolute inset-0 bg-[radial-gradient(circle_at_20%_20%,rgba(255,255,255,0.4),transparent_30%),radial-gradient(circle_at_80%_70%,rgba(255,255,255,0.3),transparent_25%)]" />
            <div className="absolute left-[10%] top-24 h-56 w-56 rounded-full bg-white/50 blur-3xl animate-pulseGlow" />
            <div className="absolute bottom-8 right-[10%] h-64 w-64 rounded-full bg-white/40 blur-3xl animate-pulseGlow" />
            <img src="assets/lbh-seal.png" alt="" aria-hidden="true" className="pointer-events-none absolute -left-40 top-1/2 hidden w-[520px] -translate-y-1/2 select-none opacity-[0.07] lg:block" />

            <div className="relative mx-auto grid min-h-[92vh] max-w-7xl items-center gap-12 px-6 py-20 lg:grid-cols-[1.2fr_.8fr] lg:px-10">
              <div key={`${location}-${lang}`} className="animate-slideUpFade">
                <div className="mb-5 inline-flex items-center gap-2 rounded-full border border-black/15 bg-black/5 px-4 py-2 text-xs uppercase tracking-[0.28em] text-neutral-700">{content.badge}</div>
                <h1 className="max-w-4xl text-5xl leading-[1] tracking-tight text-black md:text-7xl">
                  {content.title}
                  <span className="font-subtitle mt-2 block text-4xl text-neutral-500 md:text-5xl">{content.subtitle}</span>
                </h1>
                <p className="mt-6 max-w-2xl text-base leading-7 text-neutral-600 md:text-lg">{content.intro}</p>

                <div className="mt-8 flex flex-wrap gap-3">
                  <button onClick={() => setLocation("all")} className={`rounded-full border px-5 py-2 text-sm font-medium transition ${location === "all" ? "border-black bg-black text-white" : "border-black/15 bg-white text-neutral-700 hover:bg-neutral-100"}`}>{t.filterAll}</button>
                  <button onClick={() => setLocation("touquet")} className={`rounded-full border px-5 py-2 text-sm font-medium transition ${location === "touquet" ? "border-black bg-black text-white" : "border-black/15 bg-white text-neutral-700 hover:bg-neutral-100"}`}>{t.filterTouquet}</button>
                  <button onClick={() => setLocation("hardelot")} className={`rounded-full border px-5 py-2 text-sm font-medium transition ${location === "hardelot" ? "border-black bg-black text-white" : "border-black/15 bg-white text-neutral-700 hover:bg-neutral-100"}`}>{t.filterHardelot} <span className="ml-1 text-[10px] uppercase tracking-wider opacity-70">{t.soon}</span></button>
                  <button onClick={() => setLocation("meribel")} className={`rounded-full border px-5 py-2 text-sm font-medium transition ${location === "meribel" ? "border-black bg-black text-white" : "border-black/15 bg-white text-neutral-700 hover:bg-neutral-100"}`}>{t.filterMeribel}</button>
                </div>

                <div className="mt-8 flex flex-col gap-4 sm:flex-row">
                  <a href="#venues" className="rounded-full bg-black px-6 py-3 text-sm font-semibold text-white transition hover:translate-y-[-1px]">{t.discover}</a>
                  <a href="#events" className="rounded-full border border-black/15 bg-white px-6 py-3 text-sm font-semibold text-black transition hover:bg-neutral-100">{t.eventsCta}</a>
                </div>
              </div>

              <div className="relative">
                <div className="animate-floatSlow rounded-[2rem] border border-black/10 bg-white p-4 shadow-2xl">
                  <div className="rounded-[1.75rem] border border-black/10 bg-neutral-50 p-4">
                    <div className="mb-4 flex items-center justify-between">
                      <div>
                        <div className="text-xs uppercase tracking-[0.25em] text-neutral-500">{t.immersiveView}</div>
                        <div className="mt-1 text-xl font-medium text-black">{t.immersiveSubtitle[location]}</div>
                      </div>
                      <div className="rounded-full border border-emerald-600/30 bg-emerald-600/10 px-3 py-1 text-xs text-emerald-700">{t.venueWord(venues.length)}</div>
                    </div>

                    <div className="grid gap-3">
                      {venues.slice(0, 3).map((venue) => (
                        <details key={venue.name} className="group rounded-2xl border border-black/10 bg-white p-4 transition open:bg-neutral-50" style={{ borderLeft: `2px solid ${venue.color}` }}>
                          <summary className="flex cursor-pointer list-none items-center justify-between gap-3">
                            <div className="flex items-center gap-3">
                              {venue.image ? (
                                <img src={venue.image} alt="" aria-hidden="true" loading="lazy" className="h-12 w-12 flex-shrink-0 rounded-xl object-cover" />
                              ) : (
                                <div className="flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-xl" style={{ background: `${venue.color}1a` }}>
                                  <span className="logo-chip text-xs" style={{ color: venue.color }}>{venue.name.slice(0, 2)}</span>
                                </div>
                              )}
                              <div>
                                <div className="text-lg text-black">{venue.name}</div>
                                <div className="font-subtitle text-sm text-neutral-500">{venue[lang].vibe}</div>
                              </div>
                            </div>
                            <div className="rounded-full border border-black/10 px-3 py-1 text-xs text-neutral-500 transition group-open:rotate-45">+</div>
                          </summary>
                          <div className="pt-4 text-sm leading-6 text-neutral-700">
                            {venue[lang].description}
                            <div className="mt-3 flex flex-wrap gap-2">
                              {venue[lang].tags.map((tag) => (<span key={tag} className="rounded-full border border-black/10 px-3 py-1 text-xs text-neutral-600">{tag}</span>))}
                            </div>
                          </div>
                        </details>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section aria-label={t.marqueeTitle} className="border-y border-black/10 bg-white">
            <div className="mx-auto max-w-7xl px-6 py-6 lg:px-10">
              <div className="mb-4 flex items-center justify-between gap-6">
                <div className="text-[10px] uppercase tracking-[0.3em] text-neutral-500">{t.marqueeTitle}</div>
                <div className="hidden h-px flex-1 bg-black/10 md:block" />
                <div className="hidden text-[10px] uppercase tracking-[0.3em] text-neutral-500 md:block">{t.marqueeDest}</div>
              </div>
              <div className="marquee-mask relative overflow-hidden">
                <div className="animate-marquee flex w-max items-center gap-12 whitespace-nowrap py-3">
                  {[...venuesData, ...venuesData].map((v, i) => (
                    <div key={`mq-${i}`} className="flex items-center gap-12">
                      <span className="logo-chip text-2xl text-black md:text-3xl" style={{ borderBottom: `2px solid ${v.color}`, paddingBottom: '2px' }}>
                        {v.name}
                      </span>
                      <span className="text-neutral-300" aria-hidden="true">✦</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </section>

          <section id="group" className="border-y border-black/10 bg-neutral-50">
            <div className="mx-auto grid max-w-7xl gap-8 px-6 py-12 md:grid-cols-3 lg:px-10">
              {content.stats.map((item) => (
                <div key={item.label} className="rounded-3xl border border-black/10 bg-white p-6">
                  <div className="text-4xl font-semibold tracking-tight text-black">{item.value}</div>
                  <div className="mt-2 text-sm uppercase tracking-[0.2em] text-neutral-500">{item.label}</div>
                </div>
              ))}
            </div>
          </section>

          <section id="venues" className="mx-auto max-w-7xl px-6 py-24 lg:px-10">
            <div className="grid gap-10 lg:grid-cols-[.9fr_1.1fr]">
              <div>
                <div className="text-xs uppercase tracking-[0.3em] text-neutral-500">{t.venuesEyebrow[location]}</div>
                <h2 className="mt-4 text-3xl font-semibold tracking-tight text-black md:text-5xl">{content.sectionTitle}</h2>
                <p className="mt-5 max-w-xl text-base leading-7 text-neutral-600">{content.sectionDesc}</p>

                <div className="mt-8 flex flex-wrap gap-2">
                  <button onClick={() => setLocation("all")} className={`rounded-full border px-4 py-2 text-xs uppercase tracking-[0.2em] transition ${location === "all" ? "border-black bg-black text-white" : "border-black/15 text-neutral-600 hover:border-black/40"}`}>{t.shortAll} ({venuesData.length})</button>
                  <button onClick={() => setLocation("touquet")} className={`rounded-full border px-4 py-2 text-xs uppercase tracking-[0.2em] transition ${location === "touquet" ? "border-black bg-black text-white" : "border-black/15 text-neutral-600 hover:border-black/40"}`}>{t.filterTouquet} ({venuesData.filter((v) => v.loc === "touquet").length})</button>
                  <button onClick={() => setLocation("hardelot")} className={`rounded-full border px-4 py-2 text-xs uppercase tracking-[0.2em] transition ${location === "hardelot" ? "border-black bg-black text-white" : "border-black/15 text-neutral-600 hover:border-black/40"}`}>{t.filterHardelot} ({venuesData.filter((v) => v.loc === "hardelot").length})</button>
                  <button onClick={() => setLocation("meribel")} className={`rounded-full border px-4 py-2 text-xs uppercase tracking-[0.2em] transition ${location === "meribel" ? "border-black bg-black text-white" : "border-black/15 text-neutral-600 hover:border-black/40"}`}>{t.filterMeribel} ({venuesData.filter((v) => v.loc === "meribel").length})</button>
                </div>
              </div>

              <div key={`grid-${location}-${lang}`} className="grid gap-4 md:grid-cols-2">
                {venues.map((venue) => (
                  <div key={venue.name} className="group animate-slideUpFade overflow-hidden rounded-[1.75rem] border border-black/10 bg-white transition duration-300 hover:-translate-y-1 hover:border-black/30 hover:shadow-lg" style={{ borderTop: `2px solid ${venue.color}` }}>
                    {venue.image ? (
                      <div className="relative h-56 overflow-hidden">
                        <img src={venue.image} alt={venue.name} loading="lazy" className="h-full w-full object-cover transition duration-500 group-hover:scale-[1.04]" />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent" />
                        <div className="absolute left-4 top-4 rounded-full bg-white/85 px-3 py-1 text-xs text-neutral-700 backdrop-blur-sm">{venue.year}</div>
                        <div className="absolute right-4 top-4 rounded-full bg-black/70 px-3 py-1 text-xs text-white backdrop-blur-sm">{t.chip[venue.loc]}</div>
                      </div>
                    ) : (
                      <div className="relative h-56 overflow-hidden" style={{ background: `linear-gradient(135deg, ${venue.color}22 0%, ${venue.color}11 100%)` }}>
                        <div className="absolute inset-0 flex items-center justify-center">
                          <span className="logo-chip text-4xl" style={{ color: venue.color, opacity: 0.55 }}>{venue.name}</span>
                        </div>
                        <div className="absolute left-4 top-4 rounded-full border border-black/10 bg-white px-3 py-1 text-xs text-neutral-500">{venue.year}</div>
                        <div className="absolute right-4 top-4 rounded-full border border-black/10 bg-white px-3 py-1 text-xs text-neutral-500">{t.chip[venue.loc]}</div>
                      </div>
                    )}
                    <div className="p-5">
                      <h3 className="text-3xl tracking-tight text-black">{venue.name}</h3>
                      <div className="font-subtitle mt-2 text-sm text-neutral-500">{venue[lang].type}</div>
                      <p className="mt-4 text-sm leading-6 text-neutral-700">{venue[lang].description}</p>
                      <div className="mt-5 flex flex-wrap gap-2">
                        {venue[lang].tags.map((tag) => (<span key={tag} className="rounded-full bg-neutral-100 px-3 py-1 text-xs text-neutral-600">{tag}</span>))}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section id="events" className="mx-auto max-w-7xl px-6 pb-24 lg:px-10">
            <div className="overflow-hidden rounded-[2rem] border border-black/10 bg-neutral-50">
              <div className="grid lg:grid-cols-[1fr_.9fr]">
                <div className="p-8 md:p-12">
                  <div className="text-xs uppercase tracking-[0.3em] text-neutral-500">{t.eventsBadge}</div>
                  <h2 className="mt-4 text-3xl font-semibold tracking-tight text-black md:text-5xl">{t.eventsTitle[location]}</h2>
                  <p className="mt-5 max-w-2xl text-base leading-7 text-neutral-600">{t.eventsDesc[location]}</p>

                  <div className="mt-8 grid gap-4 md:grid-cols-2">
                    {t.eventsItems[location].map((item) => (
                      <div key={item} className="rounded-2xl border border-black/10 bg-white p-4 text-sm text-neutral-700">{item}</div>
                    ))}
                  </div>
                </div>

                <div className="border-t border-black/10 bg-white p-8 lg:border-l lg:border-t-0 md:p-12">
                  <div className="rounded-[1.5rem] border border-black/10 bg-neutral-50 p-5">
                    <div className="text-sm text-neutral-500">{t.parcoursLabel}</div>
                    <div className="mt-2 text-2xl font-medium text-black">{t.parcoursTitle}</div>
                    <div className="mt-6 space-y-3">
                      {[t.parcoursDest[location], t.parcoursStep2, t.parcoursStep3, t.parcoursStep4].map((step) => (
                        <div key={step} className="rounded-2xl border border-black/10 bg-white px-4 py-3 text-sm text-neutral-700">{step}</div>
                      ))}
                    </div>
                    <a href="evenements.html" className="mt-6 inline-flex items-center gap-2 rounded-full bg-black px-5 py-3 text-sm font-semibold text-white transition hover:translate-y-[-1px]">
                      {t.eventsRequest}
                      <span aria-hidden="true">→</span>
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <footer className="border-t border-black/10 bg-white px-6 py-10 text-center text-sm text-neutral-500">
            <img src="assets/lbh-seal.png" alt="La Belle Histoire Groupe" className="mx-auto mb-4 h-16 w-16 object-contain opacity-80" />
            <img src="assets/lbh-wordmark.png" alt="" aria-hidden="true" className="mx-auto mb-3 h-4 object-contain opacity-70" />
            <div>{t.footerTag}</div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<LBHHomepage />);
  </script>
</body>
</html>
